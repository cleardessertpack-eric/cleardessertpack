<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 24pt 40pt 48pt 40pt;
  background: #F4F6F6; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; box-sizing: border-box; color: #2D2D2D;
}
.header {
  border-bottom: 2pt solid #F96D00; margin-bottom: 15pt; padding-bottom: 5pt;
}
h1 { font-size: 24pt; margin: 0; color: #2D2D2D; }
.content { display: flex; flex-direction: column; flex: 1; }
.box {
  background: #ffffff; padding: 15pt; border-radius: 6pt; margin-bottom: 15pt;
}
.box-title { font-size: 16pt; font-weight: bold; margin: 0 0 10pt 0; color: #F96D00; }
ul { font-size: 14pt; margin: 0; padding-left: 20pt; line-height: 1.5; }
</style>
</head>
<body>
  <div class="header">
    <h1>客户跟进与线索梳理</h1>
  </div>
  <div class="content">
    <div class="box">
      <p class="box-title">核心询盘来源分析</p>
      <ul>
        <li><b>主要国家/地区:</b> 美国 (主导)、哥伦比亚、日本、委内瑞拉</li>
        <li><b>核心搜索词追踪:</b> Farm fence wire, 2x4 hinge joint fence, T post, No climb fence</li>
        <li><b>客户跟进池:</b> 本周共计梳理并跟进 9 位精准询盘客户，部分处于持续互动阶段。</li>
      </ul>
    </div>
    <div id="table-customers" class="placeholder" style="width: 100%; height: 140pt; background: #fff; border-radius: 4pt;"></div>
  </div>
</body>
</html>
