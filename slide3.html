<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/favicon.png">

<style>
body {
  width: 720pt; height: 405pt; margin: 0; padding: 30pt; box-sizing: border-box;
  background: #F9F6F0; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  border-left: 8pt solid #E07A5F;
  padding-left: 15pt;
  margin-bottom: 20pt;
}
h1 { color: #4A6D7C; font-size: 26pt; margin: 0; font-family: Georgia, serif; }
.timeline {
  background: #FFFFFF;
  border-radius: 8pt;
  padding: 20pt 30pt;
  flex: 1;
}
ul { margin: 0; padding-left: 20pt; }
li { font-size: 14pt; color: #2C363F; margin-bottom: 12pt; line-height: 1.4; }
.time { color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt; }
.promise { color: #4A6D7C; font-style: italic; font-size: 12pt; }
</style>
</head>
<body>
  <div class="header">
    <h1>Day 1：看海、吃鲜、拍大片</h1>
  </div>
  <div class="timeline">
    <ul>
      <li><span class="time" style="color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt;">08:30 错峰出发</span>：老婆车上补觉，宝宝睡回笼觉，我负责平稳驾驶。</li>
      <li><span class="time" style="color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt;">11:30 海鲜市场“进货”</span>：直奔石浦海鲜农贸市场，买活鲜找小店代加工。<br>
          <span class="promise" style="color: #4A6D7C; font-style: italic; font-size: 12pt;">老公承诺：海鲜钱我掏，老婆敞开吃！宝宝安排清蒸小黄鱼+水蒸蛋。</span>
      </li>
      <li><span class="time" style="color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt;">15:00 漫步东门渔村</span>：车开上岛，原生态无门票。有渔船、有灯塔、有海风。</li>
      <li><span class="time" style="color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt;">16:30 专属大片时间</span>：在妈祖庙高处等绝美“橘子海日落”。<br>
          <span class="promise" style="color: #4A6D7C; font-style: italic; font-size: 12pt;">老公承诺：你穿新中式裙子，我找角度蹲下连拍100张，宝宝归我抱！</span>
      </li>
      <li><span class="time" style="color: #E07A5F; font-weight: bold; font-family: Georgia, serif; font-size: 15pt;">18:30 晚餐</span>：吃一碗满是蛤蜊和虾的象山海鲜面，经济实惠。</li>
    </ul>
  </div>
</body>
</html>
