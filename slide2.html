<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/favicon.png">

<style>
body {
  width: 720pt; height: 405pt; margin: 0; padding: 30pt; box-sizing: border-box;
  background: #F9F6F0; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  border-bottom: 2pt solid #E07A5F;
  margin-bottom: 20pt;
}
h1 { color: #4A6D7C; font-size: 28pt; margin: 0 0 10pt 0; font-family: Georgia, serif; }
.container {
  display: flex; gap: 20pt; flex: 1;
}
.col {
  flex: 1;
  background: #FFFFFF;
  border-radius: 8pt;
  padding: 20pt;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
}
h3 { color: #E07A5F; font-size: 18pt; margin-top: 0; font-family: Georgia, serif; }
ul { margin: 0; padding-left: 20pt; }
li { font-size: 14pt; color: #2C363F; margin-bottom: 12pt; line-height: 1.4; }
.highlight { color: #4A6D7C; font-weight: bold; }
</style>
</head>
<body>
  <div class="header">
    <h1>项目立项背景（懂你的心）</h1>
  </div>
  <div class="container">
    <div class="col">
      <h3>老婆大人的核心诉求：</h3>
      <ul>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">想看海：</span>吹海风，看落日，洗去带娃和工作的班味。</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">想吃海鲜：</span>要实现海鲜自由，但绝不被网红店当韭菜割。</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">想拍美照：</span>喜欢“新中式”的清冷仙气，背景不能全是人头。</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">带2岁宝宝：</span>不能太累，不能走烂路，得有地方睡觉、有软烂食物。</li>
      </ul>
    </div>
    <div class="col" style="background: #eef3f5; border: 2pt solid #4A6D7C;">
      <h3 style="color: #4A6D7C; font-size: 18pt; margin-top: 0; font-family: Georgia, serif;">老公的解题思路：</h3>
      <ul>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">目的地：</span>宁波象山 · 东门渔村（2天1晚）</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">核心优势：</span>避开舟山跨海大桥的“五一停车场”。</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">省钱秘籍：</span>不花一分钱冤枉门票，主打“高性价比”。</li>
        <li><span class="highlight" style="color: #4A6D7C; font-weight: bold;">情绪价值：</span>高出片率、极度护娃，老公全权包办！</li>
      </ul>
    </div>
  </div>
</body>
</html>
